<div id="interactionModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="interactionModalTitle">
                Crear / Editar interacción
            </h2>

            <button
                type="button"
                class="modal-close"
                onclick="closeInteractionModal()">
                ×
            </button>

        </div>

        <div class="modal-body">

            <form id="interactionForm" class="form">

                <input type="hidden" id="id_interactions">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Tipo <span class="required">*</span></label>
                        <select id="type_id" required><option value="">Cargando tipos...</option></select>
                    </div>

                    <div class="form-group">
                        <label>Escena <span class="required">*</span></label>
                        <select id="scene_id" required></select>
                    </div>

                    <div class="form-group">
                        <label>Título <span class="required">*</span></label>
                        <input id="title" type="text" required>
                    </div>

                    <div class="form-group">
                        <label>Yaw <span class="required">*</span></label>
                        <input id="yaw" type="number" step="any" required>
                    </div>

                    <div class="form-group">
                        <label>Pitch <span class="required">*</span></label>
                        <input id="pitch" type="number" step="any" required>
                    </div>

                    <div class="form-group">

                        <div class="form-group">

                            <label>Icono <span class="required">*</span></label>

                            <div class="image-selector">

                                <img
                                    id="scenePreview"
                                    src=""
                                    style="
                                        width:100%;
                                        max-height:220px;
                                        object-fit:contain;
                                        background:#00000040;
                                        border-radius:8px;
                                        border:1px solid #ddd;
                                    "
                                >

                                <div>

                                    <button
                                        type="button"
                                        class="btn"
                                        onclick="chooseInteractionIcon()">

                                        Seleccionar icono

                                    </button>

                                    <button
                                        type="button"
                                        class="btn btn-secondary hidden"
                                        onclick="uploadSceneImage()">


                                        Subir nueva

                                    </button>

                                </div>

                            </div>

                            <input
                                type="hidden"
                                id="imagen_icon_id">

                            <input
                                type="hidden"
                                id="imagen_icon_url">

                            <!-- Mensaje de error -->
                            <small
                                id="iconError"
                                class="error-message"
                                style="display:none;">

                                Debes seleccionar un icono. <span class="required">*</span>

                            </small>

                        </div>

                    </div>

                    <div class="form-group">
                        <label>Rotación <span class="required">*</span></label>
                        <input id="rotation" type="number" step="any" required>
                    </div>

                </div>

                <div class="form-group full" id="group_description">

                    <label id="lbl_description">
                        Descripción
                    </label>

                    <textarea id="description"></textarea>

                    <small id="descriptionHint"></small>

                </div>

                <div class="form-group" id="group_link_image">

                    <div class="switch-group">

                        <label class="switch">

                            <input
                                type="checkbox"
                                id="link_imagen"
                                onclick="toggleImageLink()">

                            <span class="slider"></span>

                        </label>

                        <label id="lbl_imagen">
                            
                            <span>
                                Usar imagen 
                            </span>

                        </label>

                    </div>

                    <div class="image-selector" id="image_interaction" style="display:none;">

                        <img
                            id="scenePreviewImagen"
                            src=""
                            style="
                                width:100%;
                                max-height:220px;
                                object-fit:contain;
                                background:#00000040;
                                border-radius:8px;
                                border:1px solid #ddd;
                            "
                        >

                        <div>

                            <button
                                type="button"
                                class="btn"
                                onclick="chooseInteractionImagen()">

                                Seleccionar imagen

                            </button>

                            <button
                                type="button"
                                class="btn btn-secondary hidden"
                                onclick="uploadSceneImage()">


                                Subir nueva

                            </button>

                        </div>

                        <input
                            type="hidden"
                            id="imagen_id">

                        <input
                            type="hidden"
                            id="imagen_url">
                        
                        <!-- Mensaje de error -->
                        <small
                            id="imagenError"
                            class="error-message"
                            style="display:none;">

                            Debes seleccionar una imagen. <span class="required">*</span>

                        </small>

                    </div>

                </div>

                <div class="form-group full" id="group_foto" style="display:none;">
                
                    <label id="lbl_foto">
                        Foto de la interacción <span class="required">*</span>
                    </label>
                

                    <div class="image-selector" id="group_foto_contenedor">

                        <img
                            id="scenePreviewFoto"
                            src=""
                            style="
                                width:100%;
                                max-height:220px;
                                object-fit:contain;
                                background:#00000040;
                                border-radius:8px;
                                border:1px solid #ddd;
                            "
                        >

                        <div>

                            <button
                                type="button"
                                class="btn"
                                onclick="chooseInteractionFoto()">

                                Seleccionar imagen

                            </button>

                            <button
                                type="button"
                                class="btn btn-secondary hidden"
                                onclick="uploadSceneImage()">


                                Subir nueva

                            </button>

                        </div>

                    </div>

                    <input
                        type="hidden"
                        id="imagen_id">

                    <input
                        type="hidden"
                        id="imagen_foto_url">

                </div>
                

                <div class="form-group-full" id="group_link">

                        <label id="lbl_link">
                            Link
                        </label>

                        <input id="link" type="text">

                        <small id="linkHint"></small>

                </div>


                <div id="group_screen" class="form-grid">

                    <div class="form-group">

                        <label id="lbl_radius">
                            Radio <span class="required">*</span>
                        </label>

                        <input id="radius" type="number">

                    </div>

                    <div class="form-group">

                        <label id="lbl_width">
                            Ancho <span class="required">*</span>
                        </label>

                        <input id="width_px" type="number">

                    </div>

                    <div class="form-group">

                        <label id="lbl_height">
                            Alto <span class="required">*</span>
                        </label>

                        <input id="height_px" type="number">

                    </div>

                </div>

                <div class="form-group full" id="group_password">

                    <label id="lbl_password">
                        Contraseña <span class="required">*</span>
                    </label>

                    <div class="input-eye">

                        <input id="password" type="password">

                        <span
                            class="toggle-eye"
                            onclick="toggleApiKey('password', this)">
                            👀
                        </span>

                    </div>

                    <small id="passwordHint"></small>

                </div>

                <div class="form-group full" id="group_api">

                    <label id="lbl_api_key">
                        API KEY <span class="required">*</span>
                    </label>

                    <div class="input-eye">

                        <input id="api_key" type="password">

                        <span
                            class="toggle-eye"
                            onclick="toggleApiKey('api_key', this)">
                            👀
                        </span>

                    </div>

                    <small id="apiKeyHint">Solo para APIs que reciben la clave en la URL (ej: api_key=123456).</small>

                    <div class="switch-group">

                        <label class="switch">

                            <input
                                type="checkbox"
                                id="update_api">

                            <span class="slider"></span>

                        </label>

                        <span>
                            Mostrar fecha actualización API
                        </span>

                    </div>

                </div>

            </form>

        </div>

        <div class="modal-footer">

            <button
                type="button"
                class="btn-cancel"
                onclick="closeInteractionModal()">

                Cancelar

            </button>

            <button
                type="submit"
                form="interactionForm"
                class="btn-save">

                Guardar

            </button>

        </div>

    </div>

</div>
