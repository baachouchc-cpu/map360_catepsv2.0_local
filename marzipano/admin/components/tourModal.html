<div id="tourModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="tourModalTitle">
                Crear / Editar navegación
            </h2>

            <button
                type="button"
                class="modal-close"
                onclick="closeTourModal()">
                ×
            </button>

        </div>

        <div class="modal-body">

            <form id="tourForm" class="form">

                <input
                    type="hidden"
                    id="id_hotspots"
                >

                <div class="form-grid">

                    <div class="form-group">

                        <label>Escena origen <span class="required">*</span></label>

                        <select id="scene_id"></select>

                    </div>

                    <div class="form-group">

                        <label>Escena destino <span class="required">*</span></label>

                        <select id="link_scene_id"></select>

                    </div>

                    <div class="form-group">

                        <label>Título <span class="required">*</span></label>

                        <input
                            type="text"
                            id="title"
                        >

                    </div>

                    <div class="form-group">

                        <label>Icono <span class="required">*</span></label>

                        <select id="icon_id"></select>

                    </div>

                    <div class="form-group">

                        <label>Yaw <span class="required">*</span></label>

                        <input
                            type="number"
                            step="any"
                            id="yaw"
                        >

                    </div>

                    <div class="form-group">

                        <label>Pitch <span class="required">*</span></label>

                        <input
                            type="number"
                            step="any"
                            id="pitch"
                        >

                    </div>

                    <div class="form-group">

                        <label>Rotación <span class="required">*</span></label>

                        <input
                            type="number"
                            step="any"
                            id="rotation"
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label>Descripción</label>

                    <textarea
                        id="description"
                        rows="5">
                    </textarea>

                </div>

            </form>         
        
        </div>

        <div class="modal-footer">

            <button
                type="button"
                class="btn btn-secondary"
                onclick="closeTourModal()">

                Cancelar

            </button>

            <button
                type="submit"
                class="btn btn-primary">

                Guardar

            </button>

        </div>

    </div>

</div>
