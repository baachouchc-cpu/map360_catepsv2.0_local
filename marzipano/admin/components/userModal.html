<div id="userModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="interactionModalTitle">
                Crear / Editar usuario
            </h2>

            <button
                type="button"
                class="modal-close"
                onclick="closeUserModal()">
                ×
            </button>

        </div>

        <div class="modal-body">

            <form id="userForm" class="form">

                <input
                type="hidden"
                id="id_user"
                >

                <div class="form-grid">

                    <div class="form-group">

                        <label> Nombre </label>

                        <input
                        id="nombre"
                        required
                        >

                    </div>

                     <div class="form-group">

                        <label> Apellido </label>

                        <input
                        id="apellido"
                        required
                        >
                    
                    </div>

                     <div class="form-group">

                        <label> Rol </label>

                        <select id="rol_id"><option value="">Cargando tipos...</option></select>
                    
                    </div>

                    <div class="form-group">

                        <label> Permisos </label>

                        <select id="permisos_id"><option value="">Cargando permisos...</option></select>
                    </div>

                </div>

                <label> Contraseña </label>

                <input
                type="password"
                id="password"
                placeholder="Dejar vacío para mantener"
                >                      

                <div id="scenePermissions">

                    <hr>

                    <h3>Acceso a escenas</h3>

                    <p class="text-muted">
                        El usuario hereda las escenas del permiso seleccionado.
                        Solo se muestran las excepciones que modifican ese permiso.
                    </p>

                    <div class="permission-summary">

                        <strong>Permiso base:</strong>

                        <span id="permissionName">
                            —
                        </span>

                    </div>

                    <br>

                    <div id="imageUserSceneGrid"
                        class="permission-tree">
                    </div>

                </div>

            </form>

        </div>

        <div class="modal-footer">

            <button
            type="button"
            class="btn-cancel"
            onclick="closeUserModal()"
            >
            Cancelar
            </button>

            <button
            type="submit"
            form="userForm"
            class="btn-save">
            Guardar
            </button>

        </div>

    </div>

</div>
